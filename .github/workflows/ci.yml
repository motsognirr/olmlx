name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: uv sync --no-editable
      - name: Ruff lint
        run: uv run ruff check .

  format:
    name: Ruff Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: uv sync --no-editable
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: uv sync --no-editable
      - name: Run tests
        run: uv run pytest
