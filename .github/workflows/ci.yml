name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Ruff
    runs-on: self-hosted
    # Same-repo PRs only: these jobs run on a self-hosted Mac, so a fork PR
    # would mean arbitrary code execution on that host (checkout + uv sync +
    # pytest of attacker-controlled code). Issue #470.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        run: uv sync --no-editable
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Pyright
    runs-on: self-hosted
    # Same-repo PRs only — self-hosted runner (see `checks`). Issue #470.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        run: uv sync --no-editable
      - name: Pyright type check
        run: uv run pyright

  test:
    name: Tests
    runs-on: self-hosted
    # Same-repo PRs only — self-hosted runner (see `checks`). Issue #470.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run tests with coverage
        # Deselect real_model tests: the self-hosted runner caches downloaded
        # models, so any real-model test that finds its weights present runs
        # real MLX inference and can SIGBUS the process at Metal teardown
        # (exit 138). These tests are developer-run; CI covers the logic via
        # mocked unit tests. (The marker's intent was already documented in
        # tests/live/test_tts_speech.py.)
        run: uv sync --no-editable && uv run pytest -m "not real_model" --cov=olmlx --cov-report=xml --cov-report=term
      - name: Upload coverage report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
