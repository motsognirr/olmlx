name: Aider Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  # NOTE: the `gpt-review` and `deepseek-review` job names are referenced by
  # factory-babysit.yml's MERGE READINESS gate (it waits for these reviewer
  # check runs before merging). If you rename them, update that gate too.
  gpt-review:
    runs-on: ubuntu-latest
    # Same-repo PRs only: fork PRs don't receive repo secrets, so the review
    # would only fail noisily — skip it instead. Issue #470.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Aider Code Review (gpt-5.4-mini)
        uses: motsognirr/aider-code-review@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: gpt-5.4-mini

  deepseek-review:
    runs-on: ubuntu-latest
    # Same-repo PRs only (see `gpt-review`). Issue #470.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Aider Code Review (deepseek-v4-pro)
        uses: motsognirr/aider-code-review@v1
        with:
          deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: deepseek/deepseek-v4-pro
